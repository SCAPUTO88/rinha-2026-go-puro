services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.04"
          memory: "10M"
    networks:
      - rinha

  api1:
    image: scaputo88/rinha-2026-go:v10
    pull_policy: always
    environment:
      - REFS_BIN=/data/refs.bin
      - SOCKET_PATH=/sockets/api1.sock
      - GOMAXPROCS=1
    volumes:
      - sockets:/sockets
    restart: on-failure
    healthcheck:
      test: ["CMD", "/api", "--health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.48"
          memory: "170M"
    networks:
      - rinha

  api2:
    image: scaputo88/rinha-2026-go:v10
    pull_policy: always
    environment:
      - REFS_BIN=/data/refs.bin
      - SOCKET_PATH=/sockets/api2.sock
      - GOMAXPROCS=1
    volumes:
      - sockets:/sockets
    restart: on-failure
    healthcheck:
      test: ["CMD", "/api", "--health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.48"
          memory: "170M"
    networks:
      - rinha

volumes:
  sockets:

networks:
  rinha:
    driver: bridge
