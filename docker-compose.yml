services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "10M"
    networks:
      - rinha

  api1:
    image: scaputo88/rinha-2026-go:latest
    environment:
      - PORT=8080
      - VPTREE_BIN=/data/vptree.bin
    restart: always
    healthcheck:
      test: ["CMD", "/api", "--health"]
      interval: 3s
      timeout: 1s
      retries: 3
      start_period: 3s
    deploy:
      resources:
        limits:
          cpus: "0.44"
          memory: "170M"
    networks:
      - rinha

  api2:
    image: scaputo88/rinha-2026-go:latest
    environment:
      - PORT=8080
      - VPTREE_BIN=/data/vptree.bin
    restart: always
    healthcheck:
      test: ["CMD", "/api", "--health"]
      interval: 3s
      timeout: 1s
      retries: 3
      start_period: 3s
    deploy:
      resources:
        limits:
          cpus: "0.44"
          memory: "170M"
    networks:
      - rinha

networks:
  rinha:
    driver: bridge
