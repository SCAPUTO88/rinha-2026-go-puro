worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Upstream: round-robin between the two API instances via Unix sockets
    upstream api {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
        keepalive 256;
        keepalive_requests 10000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 reuseport;

        # Disable access log for performance
        access_log off;
        error_log /dev/null;

        location / {
            proxy_pass http://api;

            # HTTP/1.1 with keepalive for upstream connections
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # Disable buffering — pass data directly
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts generosos para não cortar conexões válidas
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }
    }
}
