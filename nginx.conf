worker_processes 1;

events {
    worker_connections 512;
}

http {
    # Upstream: round-robin between the two API instances
    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 64;
    }

    server {
        listen 9999;

        # Disable access log for performance
        access_log off;

        location / {
            proxy_pass http://api;

            # HTTP/1.1 with keepalive for upstream connections
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Disable buffering — pass data directly
            proxy_buffering off;
            proxy_request_buffering off;

            # Minimal timeouts
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }
    }
}
